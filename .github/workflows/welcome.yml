name: 🙌 Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            ¡Gracias por abrir tu primer issue! 🎉

            Revisamos todo lo que llega. Mientras tanto:
            - Revisá que hayas seguido la plantilla del issue
            - Si es un bug, asegurate de haber incluido tu `opencode --version`, `node --version` y el error completo

            ¡Gracias por contribuir a Open IA! 🚀
          pr-message: |
            ¡Gracias por tu primer PR! 🎉

            Algunos tips antes de que lo revisemos:
            - Asegurate de haber probado los cambios
            - Si es un cambio visual, incluí screenshots
            - Si modifica el instalador, probalo en una máquina limpia

            ¡Gracias por hacer Open IA mejor! 🚀
