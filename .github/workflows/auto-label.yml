name: 🏷️ Label Issues

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body?.toLowerCase() || '';
            const labels = [];

            if (title.includes('bug') || body.includes('bug') || body.includes('error') || body.includes('falla')) {
              labels.push('bug');
            }
            if (title.includes('feature') || title.includes('idea') || body.includes('feature') || body.includes('sugerencia') || body.includes('mejora')) {
              labels.push('enhancement');
            }
            if (title.includes('[config]') || body.includes('configuración') || body.includes('instalación') || body.includes('instalar')) {
              labels.push('help wanted');
            }
            if (title.includes('[duda]') || body.includes('pregunta') || body.includes('duda') || body.includes('cómo') || body.includes('ayuda')) {
              labels.push('question');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
